*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0f;color:#e0e0e0;padding-bottom:80px}
.header{background:linear-gradient(135deg,#0a0a0f,#1a1a2e);padding:16px;text-align:center;border-bottom:2px solid #4CAF50}
.title{font-size:22px;font-weight:700;background:linear-gradient(135deg,#4CAF50,#2196F3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:11px;color:#666}
.tabs{display:flex;gap:4px;padding:8px;background:#12121a;position:sticky;top:0;z-index:100}
.tab{flex:1;padding:10px;background:transparent;border:none;border-radius:8px;color:#888;font-weight:600;cursor:pointer;transition:all 0.3s;font-size:13px}
.tab.active{background:#4CAF50;color:#fff}
.card{background:#12121a;border-radius:14px;padding:16px;margin:8px;border:1px solid #1a1a2e}
.card-title{font-size:14px;font-weight:600;margin-bottom:10px;color:#4CAF50}
input{width:100%;padding:12px 16px;background:#0a0a0f;border:2px solid #1a1a2e;border-radius:12px;color:#fff;font-size:16px;outline:none;transition:all 0.3s}
input:focus{border-color:#4CAF50;box-shadow:0 0 20px rgba(76,175,80,0.15)}
input::placeholder{color:#555}
label{color:#888;font-size:12px;display:block;margin-bottom:4px}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn:active{transform:scale(0.97)}
.btn-green{background:#4CAF50;color:#fff}
.btn-red{background:#ff5252;color:#fff}
.hidden{display:none}
.suggestions{position:absolute;top:100%;left:0;right:0;z-index:50;background:#12121a;border-radius:12px;max-height:400px;overflow-y:auto;border:1px solid #1a1a2e;margin-top:4px;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
.suggestion-item{padding:12px 16px;border-bottom:1px solid #1a1a2e;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all 0.2s}
.suggestion-item:active{background:#1a1a2e}
.suggestion-item .name{font-weight:500;font-size:15px}
.suggestion-item .name mark{background:#4CAF50;color:#fff;padding:0 4px;border-radius:3px}
.suggestion-item .meta{font-size:12px;color:#888}
.suggestion-item .cat{font-size:11px;color:#4CAF50;background:#1a1a2e;padding:2px 10px;border-radius:12px}
.suggestion-item .add{background:#4CAF50;color:#fff;border:none;padding:4px 14px;border-radius:6px;font-weight:600;font-size:13px}
.search-wrapper{position:relative}
.search-stats{font-size:11px;color:#666;padding:8px 4px;text-align:right}
.diary-item{background:#0a0a0f;padding:8px 12px;border-radius:8px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.diary-item .name{font-weight:500;font-size:13px}
.diary-item .meta{font-size:11px;color:#888}
.diary-item .del{color:#ff5252;cursor:pointer;font-weight:600;padding:0 8px}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a2e}
.stat-val{font-weight:600;color:#4CAF50}
#viewer3D{width:100%;height:400px;background:#0a0a0f;border-radius:12px;touch-action:manipulation}
.slider-container{margin:8px 0}
.slider-container label{font-size:11px;color:#888;display:flex;justify-content:space-between}
.slider-container input[type=range]{width:100%;margin:4px 0;accent-color:#4CAF50}
canvas{display:block;width:100%!important;height:auto!important}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.chart-grid .chart-box{background:#0a0a0f;border-radius:8px;padding:8px;border:1px solid #1a1a2e}
.chart-grid .chart-box .chart-title{color:#888;font-size:10px;text-align:center;margin-bottom:4px}
.chart-grid canvas{width:100%!important;height:auto!important;border-radius:4px}
</style>
</head>

<div class="header">

<div id="tab-eat">
<div class="card">

</div>
<div class="search-stats" id="searchStats"></div>
</div>
<div class="card">

<div id="diary"></div>

</div>
<button class="btn btn-red" onclick="resetDiary()">🗑 Сбросить дневник</button>
</div>
</div>

<div id="tab-sim" class="hidden">
<div class="card">
<div class="card-title">👤 Параметры тела</div>
<label>Вес (кг)</label>
<input type="number" id="w" value="80">

<input type="number" id="h" value="175">
<label>Возраст</label>
<input type="number" id="age" value="25">
<label>Пол</label>
<select id="gender" style="width:100%;padding:12px;background:#0a0a0f;border:1px solid #1a1a2e;border-radius:10px;color:#fff;font-size:14px;margin-bottom:6px">
<option value="male">Мужчина</option><option value="female">Женщина</option>
</select>
<label>Дней симуляции</label>
<input type="number" id="days" value="30">
<button class="btn btn-green" onclick="runSim()">🚀 Запустить симуляцию</button>
</div>
<div id="simResult" class="hidden">
<div class="card">
<div class="card-title">📊 Динамика параметров</div>
<div class="chart-grid" id="chartsContainer"></div>
<div id="simStats"></div>
</div>
</div>
</div>

<div id="tab-body" class="hidden">
<div class="card">
<div class="card-title">🧍 3D Модель тела</div>
<div id="viewer3D"></div>
<div class="slider-container">
<label>💪 Мышцы <span id="muscleVal">45%</span></label>

</div>
<div class="slider-container">
<label>🍔 Жир <span id="fatVal">20%</span></label>
<input type="range" id="fatSlider" min="3" max="50" value="20" oninput="updateBody()">
</div>
<div class="slider-container">
<label>👁 Прозрачность <span id="skinVal">100%</span></label>
<input type="range" id="skinSlider" min="0" max="100" value="100" oninput="updateBody()">
</div>
<div class="row" style="display:flex;gap:8px">
<button class="btn" style="flex:1;padding:10px;background:#2196F3;color:#fff;border:none;border-radius:8px" onclick="showLayer('skin')">Кожа</button>
<button class="btn" style="flex:1;padding:10px;background:#7c4dff;color:#fff;border:none;border-radius:8px" onclick="showLayer('muscle')">Мышцы</button>

</div>
</div>

function smartSearch() {
    const query = document.getElementById('search').value.toLowerCase().trim();
    const suggestions = document.getElementById('suggestions');
    const stats = document.getElementById('searchStats');
    
    if (!query) {
        suggestions.classList.add('hidden');
        stats.textContent = '';
        return;
    }
    
    const start = performance.now();
    
    // Поиск с релевантностью
    const results = FOOD_DB
        .filter(item => {
            const name = item.name.toLowerCase();
            const cat = (item.cat || '').toLowerCase();
            return name.includes(query) || cat.includes(query);
        })
        .sort((a, b) => {
            const aName = a.name.toLowerCase();
            const bName = b.name.toLowerCase();
            
            // 1. Точное совпадение
            if (aName === query && bName !== query) return -1;
            if (bName === query && aName !== query) return 1;
            
            // 2. Начинается с запроса
            const aStarts = aName.startsWith(query);
            const bStarts = bName.startsWith(query);
            if (aStarts && !bStarts) return -1;
            if (!aStarts && bStarts) return 1;
            
            // 3. По длине названия
            return aName.length - bName.length;
        })
        .slice(0, 20);
    
    const elapsed = (performance.now() - start).toFixed(1);
    stats.textContent = `🔍 Найдено ${results.length} продуктов за ${elapsed}мс`;
    
    if (!results.length) {
        suggestions.innerHTML = `
            <div style="padding:20px;text-align:center;color:#666;">
                <div style="font-size:40px;margin-bottom:8px;">🔍</div>
                Ничего не найдено<br>
                <span style="font-size:11px;">Попробуйте изменить запрос</span>
            </div>
        `;
        suggestions.classList.remove('hidden');
        return;
    }
    
    // Подсветка найденного слова
    const highlight = (text, query) => {
        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, '<mark>$1</mark>');
    };
    
    suggestions.innerHTML = results.map(item => `
        <div class="suggestion-item" onclick="addToDiary(${item.id})">
            <div>
                <div class="name">${highlight(item.name, query)}</div>
                <div class="meta">${item.cal} ккал · Б:${item.pro} Ж:${item.fat} У:${item.car}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="cat">${item.cat || 'Продукт'}</span>
                <button class="add">+</button>
            </div>
        </div>
    `).join('');
    suggestions.classList.remove('hidden');
}
