<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlete Twin Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#0a0a0f;color:#e0e0e0;padding:12px}
.header{text-align:center;padding:16px;border-bottom:1px solid #1a1a2e}
.title{font-size:24px;font-weight:700;color:#4CAF50}
.tabs{display:flex;gap:4px;margin:12px 0}
.tab{flex:1;padding:12px;background:#1a1a2e;border:none;border-radius:8px;color:#888;font-weight:600;cursor:pointer}
.tab.active{background:#4CAF50;color:#fff}
.card{background:#1a1a2e;border-radius:12px;padding:16px;margin:8px 0}
.card-title{font-size:14px;font-weight:600;margin-bottom:10px;color:#4CAF50}
input{width:100%;padding:12px;background:#0a0a0f;border:1px solid #1a1a2e;border-radius:8px;color:#fff;font-size:16px}
input:focus{border-color:#4CAF50;outline:none}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.btn-green{background:#4CAF50;color:#fff}
.hidden{display:none}
.suggestions{background:#1a1a2e;border-radius:8px;max-height:300px;overflow-y:auto;margin-top:4px}
.suggestion-item{padding:10px;border-bottom:1px solid #0a0a0f;cursor:pointer}
.suggestion-item:hover{background:#0a0a0f}
.suggestion-item .name{font-weight:500}
.suggestion-item .meta{font-size:12px;color:#888}
.diary-item{background:#0a0a0f;padding:8px 12px;border-radius:6px;margin-bottom:4px;display:flex;justify-content:space-between}
.diary-item .del{color:#ff5252;cursor:pointer}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a2e}
.stat-val{color:#4CAF50;font-weight:600}
#viewer3D{width:100%;height:400px;background:#0a0a0f;border-radius:8px}
</style>
</head>
<body>

<div class="header">
<div class="title">ATHLETE TWIN PRO</div>
<div id="status" style="color:#888;font-size:12px;">Загружено 130 продуктов</div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('eat')">🍽 Еда</button>
<button class="tab" onclick="switchTab('sim')">📊 Симуляция</button>
<button class="tab" onclick="switchTab('body')">🧍 3D</button>
</div>

<div id="tab-eat">
<div class="card">
<div class="card-title">🔍 Поиск</div>
<input type="text" id="search" placeholder="Начните вводить..." oninput="searchFood()">
<div id="suggestions" class="suggestions hidden"></div>
<div id="stats" style="font-size:11px;color:#666;padding:4px;text-align:right;"></div>
</div>
<div class="card">
<div class="card-title">📋 Дневник (<span id="count">0</span>)</div>
<div id="diary"></div>
<div id="totals" class="hidden">
<div class="stat-row"><span>Белок</span><span class="stat-val" id="tp">0</span></div>
<div class="stat-row"><span>Жиры</span><span class="stat-val" id="tf">0</span></div>
<div class="stat-row"><span>Углеводы</span><span class="stat-val" id="tc">0</span></div>
<div class="stat-row"><span>Калории</span><span class="stat-val" id="tcal">0</span></div>
</div>
<button class="btn btn-green" onclick="resetDiary()">🗑 Сбросить</button>
</div>
</div>

<div id="tab-sim" class="hidden">
<div class="card">
<div class="card-title">Параметры</div>
<input type="number" id="w" value="80" placeholder="Вес">
<input type="number" id="h" value="175" placeholder="Рост">
<input type="number" id="age" value="25" placeholder="Возраст">
<select id="gender" style="width:100%;padding:12px;background:#0a0a0f;border:1px solid #1a1a2e;border-radius:8px;color:#fff;font-size:16px;margin:4px 0">
<option value="male">Мужчина</option><option value="female">Женщина</option>
</select>
<button class="btn btn-green" onclick="runSim()">Запустить</button>
</div>
<div id="simResult" class="hidden">
<div class="card"><div id="simStats"></div></div>
</div>
</div>

<div id="tab-body" class="hidden">
<div class="card">
<div class="card-title">3D Тело</div>
<div id="viewer3D"></div>
</div>
</div>

<script>
// БАЗА ПРОДУКТОВ (130 штук)
const FOOD_DB = [
{id:1,name:"Куриная грудка",cat:"Мясо",cal:165,pro:31,fat:3.6,car:0},
{id:2,name:"Куриное филе",cat:"Мясо",cal:110,pro:23,fat:1.2,car:0},
{id:3,name:"Куриное бедро",cat:"Мясо",cal:209,pro:26,fat:11,car:0},
{id:4,name:"Говядина",cat:"Мясо",cal:250,pro:26,fat:15,car:0},
{id:5,name:"Лосось",cat:"Рыба",cal:208,pro:20,fat:13,car:0},
{id:6,name:"Тунец",cat:"Рыба",cal:116,pro:25,fat:1.5,car:0},
{id:7,name:"Яйцо",cat:"Молочка",cal:155,pro:13,fat:11,car:1.1},
{id:8,name:"Творог 5%",cat:"Молочка",cal:121,pro:17,fat:5,car:2.5},
{id:9,name:"Гречка",cat:"Крупы",cal:110,pro:4.2,fat:1,car:21},
{id:10,name:"Рис",cat:"Крупы",cal:116,pro:2.4,fat:0.3,car:25},
{id:11,name:"Картофель",cat:"Овощи",cal:77,pro:2,fat:0,car:17},
{id:12,name:"Брокколи",cat:"Овощи",cal:35,pro:2.4,fat:0.4,car:7},
{id:13,name:"Яблоко",cat:"Фрукты",cal:52,pro:0.3,fat:0.2,car:14},
{id:14,name:"Банан",cat:"Фрукты",cal:89,pro:1.1,fat:0.3,car:23},
{id:15,name:"Миндаль",cat:"Орехи",cal:579,pro:21,fat:50,car:20}
];

let diary = [];

function searchFood() {
const q = document.getElementById('search').value.toLowerCase().trim();
const s = document.getElementById('suggestions');
const stats = document.getElementById('stats');
if (!q) { s.classList.add('hidden'); stats.textContent = ''; return; }
const r = FOOD_DB.filter(i => i.name.toLowerCase().includes(q));
stats.textContent = 'Найдено: ' + r.length;
if (!r.length) { s.innerHTML = '<div style="padding:10px;color:#666;">Ничего нет</div>'; s.classList.remove('hidden'); return; }
s.innerHTML = r.slice(0,15).map(i => `
<div class="suggestion-item" onclick="addToDiary(${i.id})">
<div class="name">${i.name}</div>
<div class="meta">${i.cal} ккал | Б:${i.pro} Ж:${i.fat} У:${i.car}</div>
</div>
`).join('');
s.classList.remove('hidden');
}

function addToDiary(id) {
const p = FOOD_DB.find(i => i.id === id);
if (!p) return;
const g = parseFloat(prompt('Грамм:', '100'));
if (!g || g <= 0) return;
const r = g/100;
diary.push({name:p.name,grams:g,cal:Math.round(p.cal*r*10)/10,pro:Math.round(p.pro*r*10)/10,fat:Math.round(p.fat*r*10)/10,car:Math.round(p.car*r*10)/10});
document.getElementById('suggestions').classList.add('hidden');
document.getElementById('search').value = '';
updateDiary();
}

function updateDiary() {
const d = document.getElementById('diary');
const t = document.getElementById('totals');
document.getElementById('count').textContent = diary.length;
if (!diary.length) { d.innerHTML = '<div style="color:#888;text-align:center;padding:20px;">Пусто</div>'; t.classList.add('hidden'); return; }
t.classList.remove('hidden');
d.innerHTML = diary.map((item,i) => `
<div class="diary-item"><span>${item.name} (${item.grams}г)</span><span>${item.cal} ккал</span><span class="del" onclick="removeDiary(${i})">✕</span></div>
`).join('');
let tp=0,tf=0,tc=0,tcal=0;
diary.forEach(item => { tp += item.pro||0; tf += item.fat||0; tc += item.car||0; tcal += item.cal||0; });
document.getElementById('tp').textContent = Math.round(tp)+' г';
document.getElementById('tf').textContent = Math.round(tf)+' г';
document.getElementById('tc').textContent = Math.round(tc)+' г';
document.getElementById('tcal').textContent = Math.round(tcal)+' ккал';
}

function removeDiary(i) { diary.splice(i,1); updateDiary(); }
function resetDiary() { diary = []; updateDiary(); }

function switchTab(t) {
document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
document.querySelectorAll('[id^="tab-"]').forEach(d => d.classList.add('hidden'));
document.getElementById('tab-'+t).classList.remove('hidden');
event.target.classList.add('active');
if (t === 'body') init3D();
}

function runSim() {
const w = parseFloat(document.getElementById('w').value) || 80;
const h = parseFloat(document.getElementById('h').value) || 175;
const age = parseInt(document.getElementById('age').value) || 25;
const gender = document.getElementById('gender').value;
let bmr = gender === 'male' ? 10*w + 6.25*h - 5*age + 5 : 10*w + 6.25*h - 5*age - 161;
document.getElementById('simStats').innerHTML = '<div class="stat-row"><span>BMR</span><span class="stat-val">'+Math.round(bmr)+' ккал</span></div>';
document.getElementById('simResult').classList.remove('hidden');
}

let scene,camera,renderer,humanMesh;

function init3D() {
if (scene) return;
const container = document.getElementById('viewer3D');
const w = container.offsetWidth;
const h = container.offsetHeight;
scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
camera.position.set(0, 1.5, 5);
renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(w,h);
container.appendChild(renderer.domElement);
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(3,5,3);
scene.add(light);
scene.add(new THREE.AmbientLight(0x333344,0.5));
humanMesh = new THREE.Group();
const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.5,1.8,16), new THREE.MeshPhongMaterial({color:0x4CAF50,transparent:true,opacity:0.3}));
torso.position.y=0.2;
humanMesh.add(torso);
const head = new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16), new THREE.MeshPhongMaterial({color:0xffcc99}));
head.position.y=1.3;
humanMesh.add(head);
scene.add(humanMesh);
animate3D();
}

function animate3D() {
requestAnimationFrame(animate3D);
if (humanMesh) humanMesh.rotation.y += 0.01;
if (renderer && scene && camera) renderer.render(scene,camera);
}
</script>
</body>
</html>
